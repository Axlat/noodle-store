                <h2 class="fw-bold mb-4">藏在民生社區的時光機</h2>
                <p>戴記福建涼麵自民國時期創立至今，不靠華麗的招牌，只靠口耳相傳的美味。我們位於台北富錦街，環境就像是傳統的麵攤，不講究裝潢，卻帶著一種傳統熟悉的溫度。</p>
                <p>每一碗涼麵的醬汁都是經過比例精確調配，微酸清爽不膩口。而我們最引以為傲的肉骨湯，更是選用每日新鮮溫體豬肉熬煮多時，確保肉質軟嫩如舌尖輕撥即化。</p>
